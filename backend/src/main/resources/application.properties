# ── Server ────────────────────────────────────────────
server.port=5000

# ── Database ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/stratumiq
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────
jwt.access.secret=my_super_secret_access_key_123456789
jwt.access.expiration=900000
jwt.refresh.secret=my_super_secret_refresh_key_987654321
jwt.refresh.expiration=604800000

# ── CORS ──────────────────────────────────────────────
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:3000}

# ── Cookie ────────────────────────────────────────────
app.cookie.secure=false
app.cookie.same-site=Lax