server:
  port: 5000

app:
  cors:
    allowed-origin: ${FRONTEND_URL:https://app.example.com}
  cookie:
    secure: true
    # None required for cross-origin credentialed requests (Vercel → Railway).
    # Primary auth uses Authorization: Bearer; cookies are a secondary fallback.
    same-site: None

jwt:
  access:
    secret: ${JWT_ACCESS_SECRET}
    expiration: ${JWT_ACCESS_EXPIRATION:1800000}  # 30 minutes
  refresh:
    secret: ${JWT_REFRESH_SECRET}
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

session:
  idle-timeout: ${SESSION_IDLE_TIMEOUT:1500000}  # 25 minutes
  warning-time: ${SESSION_WARNING_TIME:300000}  # 5 minutes
  remember-me-duration: ${REMEMBER_ME_DURATION:2592000000}  # 30 days
  max-invalid-attempts: ${SESSION_MAX_INVALID_ATTEMPTS:5}
  token-rotation-enabled: ${TOKEN_ROTATION_ENABLED:true}
